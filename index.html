<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JurisParaguay — Derecho Paraguayo</title>
  <meta name="description" content="Plataforma de consulta de códigos legales vigentes del Paraguay para juristas y litigantes." />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--clr-primary) 0%, var(--clr-primary-light) 100%);
      color: #fff;
      padding: 3.5rem 0 3rem;
      text-align: center;
    }
    .hero__logo { display:block; width:90%; max-width:580px; height:auto;
      margin:0 auto 1.2rem; filter:drop-shadow(0 4px 20px rgba(0,0,0,.3));
      transition:opacity .2s,transform .2s; }
    .hero__logo-link { display:block; width:fit-content; margin:0 auto; cursor:pointer; }
    .hero__logo-link:hover .hero__logo { opacity:.88; transform:scale(1.015); }
    .hero__tagline { font-size:clamp(.95rem,2.5vw,1.15rem); opacity:.85;
      font-style:italic; letter-spacing:.3px; margin-bottom:2rem; }

    /* ── Grid re-diseñado ── */
    .categorias-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 2.5rem 0 3rem;
    }

    /* Tarjeta horizontal */
    .cat-card {
      display: flex;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      overflow: hidden;
      border: 1px solid var(--clr-border);
      transition: box-shadow .2s;
    }
    .cat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.11); }

    /* Franja lateral de color con ícono SVG */
    .cat-card__side {
      width: 68px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: 1.2rem .4rem;
      color: #fff;
    }
    .cat-card__side svg {
      width: 22px;
      height: 22px;
      opacity: .9;
    }
    .cat-card__side-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .75;
      line-height: 1;
    }

    /* Cuerpo de la tarjeta */
    .cat-card__body {
      flex: 1;
      padding: .8rem 0;
      min-width: 0;
    }
    .cat-card__title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--clr-text-muted);
      padding: 0 1.2rem .6rem;
      border-bottom: 1px solid var(--clr-border);
      margin-bottom: .2rem;
    }

    /* Lista de códigos en columnas */
    .cat-codigos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
    .cat-codigo-link {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .7rem 1.2rem;
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid #f4f4f4;
      border-left: 3px solid transparent;
      transition: border-left-color .15s, background .15s;
    }
    .cat-codigo-link:hover {
      background: #fafbff;
      border-left-color: var(--clr-accent);
    }
    .cat-codigo-link:last-child { border-bottom: none; }
    .cat-codigo-ley {
      flex-shrink: 0;
      font-size: .68rem;
      font-weight: 700;
      color: var(--clr-accent);
      background: rgba(200,168,75,.1);
      border: 1px solid rgba(200,168,75,.3);
      border-radius: 4px;
      padding: .15rem .45rem;
      margin-top: .15rem;
      white-space: nowrap;
      line-height: 1.4;
    }
    .cat-codigo-info { display:flex; flex-direction:column; min-width:0; }
    .cat-codigo-nombre {
      font-size: .88rem;
      font-weight: 600;
      color: var(--clr-text);
      line-height: 1.35;
    }
    .cat-codigo-link:hover .cat-codigo-nombre { color: var(--clr-primary-light); }
    .cat-codigo-desc {
      font-size: .75rem;
      color: var(--clr-text-muted);
      margin-top: .2rem;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--clr-text-muted); }
    .empty-state svg { width:48px; height:48px; opacity:.35; margin-bottom:.75rem; display:block; margin-inline:auto; }

    /* ── Diagnóstico flotante ── */
    #jp-diag { position:fixed; bottom:1rem; right:1rem; z-index:9999;
      max-width:360px; font-size:.78rem; font-family:monospace;
      display:flex; flex-direction:column; gap:.3rem; pointer-events:none; }
    #jp-diag div { padding:.35rem .65rem; border-radius:6px;
      box-shadow:0 2px 8px rgba(0,0,0,.3); color:#fff; }
  </style>
</head>
<body>

  <section class="hero" id="inicio">
    <div class="container">
      <a href="index.html" class="hero__logo-link" title="Inicio">
        <img src="logo.png" alt="JurisParaguay" class="hero__logo" />
      </a>
      <p class="hero__tagline">El derecho paraguayo, al alcance de todos</p>
      <div class="search-bar">
        <input type="search" id="searchInput" placeholder="Buscar código, ley o artículo…" autocomplete="off" />
        <button onclick="buscar()">&#128269; Buscar</button>
      </div>
    </div>
  </section>

  <div id="jp-progress-wrap">
    <span id="jp-progress-text">Cargando índice…</span>
    <div class="jp-progress-track"><div id="jp-progress-bar" style="width:0%"></div></div>
  </div>

  <main class="container" id="principal">
    <div id="categorias-grid" class="categorias-grid"></div>
    <div id="resultados-container"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <p><strong>JurisParaguay</strong> — Herramienta de consulta para juristas y litigantes del derecho paraguayo.</p>
      <p>Los textos normativos son de acceso público. Esta plataforma no provee asesoramiento legal.</p>
      <p style="margin-top:.5rem;opacity:.6;font-size:.85rem">&copy; 2026 JurisParaguay</p>
    </div>
  </footer>

  <div id="jp-diag"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
