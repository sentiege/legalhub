<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegalHub — Derecho Paraguayo</title>
  <meta name="description" content="Plataforma de consulta de códigos legales vigentes del Paraguay para juristas y litigantes." />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .hero {
      background: linear-gradient(135deg, var(--clr-primary) 0%, var(--clr-primary-light) 100%);
      color: #fff;
      padding: 3.5rem 0 3rem;
      text-align: center;
    }
    .hero__logo {
      display: block;
      width: 90%;
      max-width: 600px;
      height: auto;
      margin: 0 auto 1.4rem;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,.3));
    }
    .hero__tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      opacity: .9;
      font-style: italic;
      letter-spacing: .3px;
      margin-bottom: 2rem;
    }
    .quick-access {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 1.2rem;
      padding: 0 1rem;
    }
    .quick-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background .18s, transform .15s;
    }
    .quick-btn.primary {
      background: #fff;
      color: var(--clr-primary, #1f3147);
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    .quick-btn.primary:hover {
      background: #f0d9a0;
      transform: translateY(-1px);
    }
    .quick-btn.outline {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .quick-btn.outline:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <section class="hero" id="buscar">
    <div class="container hero__inner">
      <img src="logo.png" alt="LegalHub Paraguay" class="hero__logo" />
      <p class="hero__tagline">El derecho paraguayo, al alcance de todos</p>
      <div class="search-bar">
        <input type="search" id="searchInput" placeholder="Buscar código, ley o materia…" autocomplete="off" />
        <button onclick="buscar()">&#128269; Buscar</button>
      </div>
      <div class="quick-access">
        <a class="quick-btn primary" href="codigos/index.html">📚 Ver todos los códigos</a>
        <a class="quick-btn outline" href="https://sentiege.github.io/legalhub/codigos/codigopenal/index.html">⚖️ Código Penal</a>
      </div>
    </div>
  </section>

  <main class="container" id="codigos">
    <div id="categorias-grid" class="categorias-grid"></div>
  </main>

  <footer class="footer" id="acerca">
    <div class="container">
      <p><strong>LegalHub</strong> — Herramienta de consulta para juristas y litigantes del derecho paraguayo.</p>
      <p>Los textos normativos son de acceso público. Esta plataforma no provee asesoramiento legal.</p>
      <p style="margin-top:0.5rem;opacity:.6;font-size:.85rem">&copy; 2026 LegalHub Paraguay</p>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
