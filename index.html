<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegalHub — Derecho Paraguayo</title>
  <meta name="description" content="Plataforma de consulta de códigos legales vigentes del Paraguay para juristas y litigantes." />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .hero {
      background: linear-gradient(135deg, var(--clr-primary) 0%, var(--clr-primary-light) 100%);
      color: #fff;
      padding: 3.5rem 0 3rem;
      text-align: center;
    }
    .hero__logo {
      display: block;
      width: 90%;
      max-width: 600px;
      height: auto;
      margin: 0 auto 1.4rem;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,.3));
    }
    .hero__tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      opacity: .9;
      font-style: italic;
      letter-spacing: .3px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <section class="hero" id="buscar">
    <div class="container hero__inner">
      <img src="logo.png" alt="LegalHub Paraguay" class="hero__logo" />
      <p class="hero__tagline">El derecho paraguayo, al alcance de todos</p>
      <div class="search-bar">
        <input type="search" id="searchInput" placeholder="Buscar código, ley o materia…" autocomplete="off" />
        <button onclick="buscar()">&#128269; Buscar</button>
      </div>
    </div>
  </section>

  <main class="container" id="codigos">
    <div id="categorias-grid" class="categorias-grid"></div>
  </main>

  <footer class="footer" id="acerca">
    <div class="container">
      <p><strong>LegalHub</strong> — Herramienta de consulta para juristas y litigantes del derecho paraguayo.</p>
      <p>Los textos normativos son de acceso público. Esta plataforma no provee asesoramiento legal.</p>
      <p style="margin-top:0.5rem;opacity:.6;font-size:.85rem">&copy; 2026 LegalHub Paraguay</p>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
